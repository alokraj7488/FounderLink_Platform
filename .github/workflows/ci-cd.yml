# ─────────────────────────────────────────────────────────────
#  FounderLink CI/CD Pipeline
#  Triggers: push to main, pull requests to main
#  Steps: Build → Test → Docker Build & Push
# ─────────────────────────────────────────────────────────────

name: FounderLink CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  JAVA_VERSION: '17'
  NODE_VERSION: '18'
  DOCKER_REGISTRY: docker.io

jobs:

  # ─────────────────────────────────────────────────────────────
  #  Job 1: Build & Test all backend microservices
  # ─────────────────────────────────────────────────────────────
  build-backend:
    name: Build Backend Services
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Build ConfigServer
        run: mvn clean package -DskipTests -q
        working-directory: ConfigServer

      - name: Build EurekaServer
        run: mvn clean package -DskipTests -q
        working-directory: EurekaServer

      - name: Build APIGateway
        run: mvn clean package -DskipTests -q
        working-directory: APIGateway

      - name: Build AuthService
        run: mvn clean package -DskipTests -q
        working-directory: AuthService

      - name: Build UserService
        run: mvn clean package -DskipTests -q
        working-directory: UserService

      - name: Build StartupService
        run: mvn clean package -DskipTests -q
        working-directory: StartupService

      - name: Build InvestmentService
        run: mvn clean package -DskipTests -q
        working-directory: InvestmentService

      - name: Build TeamService
        run: mvn clean package -DskipTests -q
        working-directory: TeamService

      - name: Build MessagingService
        run: mvn clean package -DskipTests -q
        working-directory: MessagingService

      - name: Build NotificationService
        run: mvn clean package -DskipTests -q
        working-directory: NotificationService

      - name: Build PaymentService
        run: mvn clean package -DskipTests -q
        working-directory: PaymentService

  # ─────────────────────────────────────────────────────────────
  #  Job 2: Build & Test Frontend
  # ─────────────────────────────────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: Founderlink-Frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        working-directory: Founderlink-Frontend

      - name: Lint
        run: npm run lint
        working-directory: Founderlink-Frontend

      - name: TypeScript check
        run: npx tsc --noEmit
        working-directory: Founderlink-Frontend

      - name: Build Frontend
        run: npm run build
        working-directory: Founderlink-Frontend

  # ─────────────────────────────────────────────────────────────
  #  Job 3: Build & Push Docker images (only on push to main)
  # ─────────────────────────────────────────────────────────────
  docker-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [ build-backend, build-frontend ]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    strategy:
      matrix:
        include:
          - service: ConfigServer
            image: founderlink-config
          - service: EurekaServer
            image: founderlink-eureka
          - service: APIGateway
            image: founderlink-gateway
          - service: AuthService
            image: founderlink-auth
          - service: UserService
            image: founderlink-user
          - service: StartupService
            image: founderlink-startup
          - service: InvestmentService
            image: founderlink-investment
          - service: TeamService
            image: founderlink-team
          - service: MessagingService
            image: founderlink-messaging
          - service: NotificationService
            image: founderlink-notification
          - service: PaymentService
            image: founderlink-payment
          - service: Founderlink-Frontend
            image: founderlink-frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:${{ github.sha }}
          build-args: |
            ${{ matrix.service == 'Founderlink-Frontend' && format('VITE_API_BASE_URL={0}', secrets.VITE_API_BASE_URL) || '' }}
            ${{ matrix.service == 'Founderlink-Frontend' && format('VITE_WS_URL={0}', secrets.VITE_WS_URL) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
